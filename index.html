<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cookie Analyzer</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function CookieAnalyzer() {
          const [cookies, setCookies] = useState([]);
          const [expandedId, setExpandedId] = useState(null);
          const [showMap, setShowMap] = useState(false);
          const scoringCriteria = {
            chocolateQuality: { label: 'CHOCOLATE QUALITY', weight: 0.25 },
            chewiness: { label: 'CHEWINESS', weight: 0.20 },
            butterFlavor: { label: 'BUTTER FLAVOR', weight: 0.15 },
            textureVariety: { label: 'TEXTURE VARIETY', weight: 0.15 },
            saltBalance: { label: 'SALT BALANCE', weight: 0.10 },
            originality: { label: 'ORIGINALITY', weight: 0.10 },
            value: { label: 'VALUE', weight: 0.05 }
          };
          const getScoreColor = (score) => {
            if (score >= 9) return '#1a1a1a';
            if (score >= 8) return '#4a4a4a';
            if (score >= 7) return '#7a7a7a';
            return '#b0b0b0';
          };
          const cookieDatabase = [
            { id: 1, name: 'LEVAIN BAKERY ORIGINAL', location: 'Upper West Side', address: '167 W 74th St, NY 10023', image: 'https://i.imgur.com/8Y2X9mK.jpg', scores: { chocolateQuality: 9, chewiness: 9, butterFlavor: 8, textureVariety: 9, saltBalance: 8, originality: 7, value: 7 }, notes: 'Iconic NYC cookie. Dense, chewy with premium chocolate chunks.', reviewCount: 156 },
            { id: 2, name: 'FLOUR & APRON SALTED CHOCOLATE', location: 'Nolita', address: '209 Mulberry St, NY 10012', image: 'https://i.imgur.com/K8vZ2nL.jpg', scores: { chocolateQuality: 8, chewiness: 8, butterFlavor: 9, textureVariety: 8, saltBalance: 9, originality: 8, value: 8 }, notes: 'Beautiful balance of salted caramel and dark chocolate.', reviewCount: 89 },
            { id: 3, name: 'CITY BAKERY WARM COOKIE', location: 'Flatiron', address: '200 Flatiron Building, NY 10010', image: 'https://i.imgur.com/7Rq9mP2.jpg', scores: { chocolateQuality: 8, chewiness: 10, butterFlavor: 8, textureVariety: 8, saltBalance: 7, originality: 9, value: 9 }, notes: 'Served warm. Perfect chewiness.', reviewCount: 203 },
            { id: 4, name: 'ONE AWESOME CHOCOLATE CHUNK', location: 'Williamsburg', address: '60 N 3rd St, Brooklyn, NY 11249', image: 'https://i.imgur.com/9Xm5nK3.jpg', scores: { chocolateQuality: 9, chewiness: 8, butterFlavor: 9, textureVariety: 9, saltBalance: 8, originality: 7, value: 9 }, notes: 'Excellent value. Large chunks of premium chocolate.', reviewCount: 142 },
            { id: 5, name: 'CHEBAN CHOCOLATE CHIP', location: 'East Village', address: '123 St Marks Pl, NY 10009', image: 'https://i.imgur.com/2Lp8qR9.jpg', scores: { chocolateQuality: 8, chewiness: 9, butterFlavor: 8, textureVariety: 7, saltBalance: 8, originality: 6, value: 9 }, notes: 'Russian-inspired. Crispy edges, chewy center.', reviewCount: 76 },
            { id: 6, name: 'BALTHAZAR CHOCOLATE CHIP', location: 'SoHo', address: '80 Spring St, NY 10012', image: 'https://i.imgur.com/4Ts6uM7.jpg', scores: { chocolateQuality: 9, chewiness: 7, butterFlavor: 9, textureVariety: 7, saltBalance: 8, originality: 8, value: 7 }, notes: 'French technique. Buttery and refined.', reviewCount: 118 },
            { id: 7, name: 'CULTURE ESPRESSO CHOCOLATE CHIP', location: 'Murray Hill', address: '75 Third Ave, NY 10003', image: 'https://i.imgur.com/5Nv3pW8.jpg', scores: { chocolateQuality: 8, chewiness: 8, butterFlavor: 9, textureVariety: 8, saltBalance: 8, originality: 7, value: 8 }, notes: 'Coffee shop favorite. Perfectly balanced.', reviewCount: 95 },
            { id: 8, name: 'LA MERCERIE COOKIE', location: 'West Village', address: '54 Gansevoort St, NY 10014', image: 'https://i.imgur.com/6Xc4dT1.jpg', scores: { chocolateQuality: 9, chewiness: 8, butterFlavor: 9, textureVariety: 8, saltBalance: 9, originality: 9, value: 8 }, notes: 'French-inspired with creative twists.', reviewCount: 112 },
            { id: 9, name: 'FROM LUCIE\'S CHOCOLATE CHUNK', location: 'Sunset Park', address: '348 9th St, Brooklyn, NY 11215', image: 'https://i.imgur.com/3Hj2vL5.jpg', scores: { chocolateQuality: 9, chewiness: 9, butterFlavor: 9, textureVariety: 9, saltBalance: 9, originality: 8, value: 9 }, notes: 'Cult favorite. Perfect balance of everything.', reviewCount: 178 },
            { id: 10, name: 'ORCHARD BAKERY DARK CHOCOLATE', location: 'Lower East Side', address: '49 Orchard St, NY 10002', image: 'https://i.imgur.com/8Qw1sZ6.jpg', scores: { chocolateQuality: 9, chewiness: 8, butterFlavor: 8, textureVariety: 8, saltBalance: 8, originality: 7, value: 9 }, notes: 'Dark chocolate specialty. Rich cocoa flavor.', reviewCount: 87 },
            { id: 11, name: 'THE PASTRY BOX CHOCOLATE CHIP', location: 'Midtown', address: '408 W 14th St, NY 10014', image: 'https://i.imgur.com/7Rq9mP2.jpg', scores: { chocolateQuality: 9, chewiness: 9, butterFlavor: 9, textureVariety: 8, saltBalance: 8, originality: 8, value: 8 }, notes: 'Elegant and refined. Premium ingredients.', reviewCount: 134 }
          ];
          const calculateOverallScore = (scores) => {
            let total = 0;
            for (let criterion in scoringCriteria) {
              total += (scores[criterion] || 0) * scoringCriteria[criterion].weight;
            }
            return total.toFixed(2);
          };
          useEffect(() => {
            const cookiesWithScores = cookieDatabase.map(cookie => ({
              ...cookie,
              overallScore: calculateOverallScore(cookie.scores)
            }));
            setCookies(cookiesWithScores.sort((a, b) => parseFloat(b.overallScore) - parseFloat(a.overallScore)));
          }, []);
          return (
            <div style={{ fontFamily: 'system-ui, -apple-system, sans-serif', background: '#fff', color: '#000' }}>
              <nav style={{ borderBottom: '1px solid #000', padding: '20px 0', position: 'sticky', top: 0, background: '#fff', zIndex: 50 }}>
                <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 20px' }}>
                  <h1 style={{ fontSize: '14px', fontWeight: 700, letterSpacing: '2px', margin: 0 }}>THE COOKIE INDEX</h1>
                </div>
              </nav>
              <header style={{ padding: '60px 20px', borderBottom: '1px solid #000', maxWidth: '1200px', margin: '0 auto' }}>
                <p style={{ margin: '0 0 8px 0', fontSize: '12px', letterSpacing: '1px' }}>NEW YORK CITY</p>
                <h2 style={{ margin: '0 0 20px 0', fontSize: '42px', fontWeight: 700, lineHeight: 1.2 }}>The Definitive Chocolate Chip Cookie Ranking</h2>
              </header>
              {!showMap ? (
                <section style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 20px' }}>
                  {cookies.map((cookie, index) => (
                    <div key={cookie.id} style={{ borderBottom: '1px solid #000', padding: '30px 0', cursor: 'pointer' }} onClick={() => setExpandedId(expandedId === cookie.id ? null : cookie.id)}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '30px' }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: 'flex', gap: '20px', alignItems: 'flex-start' }}>
                            <span style={{ fontSize: '48px', fontWeight: 700, lineHeight: 1, width: '60px' }}>{index + 1}</span>
                            <div>
                              <h3 style={{ margin: '0 0 6px 0', fontSize: '16px', fontWeight: 700, letterSpacing: '0.5px' }}>{cookie.name}</h3>
                              <p style={{ margin: '0 0 12px 0', fontSize: '12px', color: '#666' }}>{cookie.location}</p>
                              <p style={{ margin: '0', fontSize: '12px', color: '#999' }}>{cookie.address}</p>
                            </div>
                          </div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'flex-start', gap: '40px' }}>
                          <div style={{ textAlign: 'right' }}>
                            <p style={{ margin: '0 0 4px 0', fontSize: '11px', color: '#999', letterSpacing: '0.5px' }}>SCORE</p>
                            <p style={{ margin: '0', fontSize: '32px', fontWeight: 700, color: getScoreColor(parseFloat(cookie.overallScore)) }}>{cookie.overallScore}</p>
                            <p style={{ margin: '4px 0 0 0', fontSize: '11px', color: '#999' }}>{cookie.reviewCount} reviews</p>
                          </div>
                          <div style={{ width: '180px', height: '180px', display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1px solid #000', overflow: 'hidden', background: '#f5f5f5' }}>
                            <img src={cookie.image} alt={cookie.name} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                          </div>
                        </div>
                      </div>
                      {expandedId === cookie.id && (
                        <div style={{ paddingLeft: '80px', borderTop: '1px solid #000', paddingTop: '30px', marginTop: '30px' }}>
                          <p style={{ margin: '0', fontSize: '13px' }}>{cookie.notes}</p>
                          <div style={{ borderTop: '1px solid #000', paddingTop: '30px', marginTop: '30px' }}>
                            <h4 style={{ margin: '0 0 24px 0', fontSize: '12px', fontWeight: 700 }}>SCORE BREAKDOWN</h4>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '30px' }}>
                              {Object.entries(scoringCriteria).map(([key, criterion]) => (
                                <div key={key}>
                                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                                    <span style={{ fontSize: '12px', fontWeight: 600 }}>{criterion.label}</span>
                                    <span style={{ fontSize: '14px', fontWeight: 700, color: getScoreColor(cookie.scores[key]) }}>{cookie.scores[key]}/10</span>
                                  </div>
                                  <div style={{ width: '100%', height: '6px', background: '#e0e0e0', overflow: 'hidden' }}>
                                    <div style={{ height: '100%', background: getScoreColor(cookie.scores[key]), width: `${(cookie.scores[key] / 10) * 100}%`, transition: 'width 0.3s ease' }}></div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </section>
              ) : (
                <section style={{ minHeight: '80vh', padding: '40px 20px', background: '#f8f8f8' }}>
                  <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
                    <h3 style={{ fontSize: '14px', fontWeight: 700, letterSpacing: '2px', margin: '0 0 30px 0' }}>ALL 11 LOCATIONS</h3>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
                      {cookies.map((cookie, idx) => (
                        <a key={cookie.id} href={`https://www.google.com/maps/search/${encodeURIComponent(cookie.address)}`} target="_blank" rel="noopener noreferrer" style={{ textDecoration: 'none', color: 'inherit' }}>
                          <div style={{ padding: '20px', border: '1px solid #000', background: '#fff', cursor: 'pointer', transition: 'all 0.3s ease' }} onMouseEnter={(e) => { e.currentTarget.style.background = '#f0f0f0'; }} onMouseLeave={(e) => { e.currentTarget.style.background = '#fff'; }}>
                            <p style={{ margin: '0 0 8px 0', fontWeight: 700, fontSize: '14px' }}>#{idx + 1} {cookie.name}</p>
                            <p style={{ margin: '0 0 4px 0', color: '#666', fontSize: '12px' }}>{cookie.location}</p>
                            <p style={{ margin: '0 0 12px 0', color: '#999', fontSize: '11px' }}>{cookie.address}</p>
                            <p style={{ margin: '0', color: '#0066cc', fontSize: '11px', fontWeight: 600 }}>📍 View on Google Maps</p>
                          </div>
                        </a>
                      ))}
                    </div>
                  </div>
                </section>
              )}
              <button onClick={() => setShowMap(!showMap)} style={{ position: 'fixed', bottom: '30px', right: '30px', width: '60px', height: '60px', borderRadius: '50%', background: '#000', border: 'none', cursor: 'pointer', fontSize: '24px', zIndex: 100 }}>
                {showMap ? '🍪' : '🗺️'}
              </button>
            </div>
          );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<CookieAnalyzer />);
    </script>
</body>
</html>
